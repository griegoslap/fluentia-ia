<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Fluentia IA</title>
<style>
:root{--bg:#07162c;--bg2:#0f2650;--ink:#102033;--muted:#667085;--line:#e7edf5;--brand:#5d5cff;--brand2:#00c2a7;--hot:#ff6f61;--gold:#ffc845;--ok:#16b364;--danger:#e5486d;--card:#fff;--soft:#f6f8fc;--safe:env(safe-area-inset-bottom,0px);--shadow:0 18px 45px rgba(16,32,51,.14)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f3f6fb;color:var(--ink);overflow-x:hidden}button,input,textarea,select{font:inherit}button{border:0;cursor:pointer}textarea{resize:vertical}.hidden{display:none!important}.tiny{font-size:12px;color:var(--muted);line-height:1.45}.muted{color:var(--muted)}.strong{font-weight:900}.center{text-align:center}.app{max-width:1100px;margin:0 auto;min-height:100vh;padding-bottom:calc(92px + var(--safe));background:linear-gradient(180deg,#eaf2ff,#f8fafc 42%,#f3f6fb)}

.topbar{position:sticky;top:0;z-index:40;background:rgba(247,249,252,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(230,235,243,.88);display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px}.brand{display:flex;gap:10px;align-items:center;min-width:0}.logo{width:45px;height:45px;border-radius:18px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;color:#fff;font-weight:1000;box-shadow:0 9px 22px rgba(93,92,255,.22)}.brand h1{font-size:19px;line-height:1;margin:0}.brand p{font-size:12px;margin:4px 0 0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 10px;font-size:12px;font-weight:950}.pill.dark{background:#07162c;color:#fff;border-color:#07162c}.screen{display:none;padding:13px 12px 10px;animation:fade .18s ease}.screen.active{display:block}@keyframes fade{from{opacity:.2;transform:translateY(5px)}to{opacity:1;transform:none}}
.nav{position:fixed;z-index:100;left:50%;bottom:0;transform:translateX(-50%);width:min(1100px,100%);display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:linear-gradient(180deg,#132849,#07162c);padding:8px 7px calc(8px + var(--safe));border-top-left-radius:25px;border-top-right-radius:25px;box-shadow:0 -18px 42px rgba(0,0,0,.24)}.nav button{background:transparent;color:#a9b6ca;border-radius:16px;font-size:10px;font-weight:900;display:flex;flex-direction:column;gap:4px;align-items:center;padding:8px 2px 7px;line-height:1}.nav .ico{font-size:21px}.nav button.active{background:rgba(255,255,255,.13);color:#fff}.hero{position:relative;overflow:hidden;border-radius:34px;padding:22px;margin:4px 0 14px;color:#fff;background:radial-gradient(circle at 92% 0,rgba(0,194,167,.72),transparent 28%),radial-gradient(circle at 8% 100%,rgba(255,111,97,.50),transparent 35%),linear-gradient(135deg,#07162c,#293d86 66%,#008a7b);box-shadow:var(--shadow)}.hero:after{content:"";position:absolute;right:-35px;bottom:-45px;width:170px;height:170px;border-radius:45px;background:rgba(255,255,255,.10);transform:rotate(18deg)}.hero h2{font-size:32px;line-height:1.03;margin:0 0 9px;letter-spacing:-.8px}.hero p{color:#e7f2ff;line-height:1.45;margin:0}.section-title{font-size:29px;line-height:1.05;margin:0 0 8px;letter-spacing:-.55px}.subtitle{font-size:15px;color:var(--muted);line-height:1.45;margin:0 0 14px}.kicker{font-size:11px;font-weight:1000;letter-spacing:1.7px;text-transform:uppercase;color:#667085;margin:5px 0 7px}.metric{font-size:34px;line-height:1;font-weight:1000;letter-spacing:-1px}.bar{height:12px;border-radius:999px;background:#e4e9f2;overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--brand),var(--brand2));width:0}.chips{display:flex;gap:8px;overflow:auto;padding-bottom:3px;scrollbar-width:none}.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;font-size:13px;font-weight:950;color:#263a59;white-space:nowrap}.chip.active{background:#07162c;color:#fff}.chip.done{background:#e7fbef;color:#087b40;border-color:#bfefd3}.task{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:22px;padding:12px;margin:9px 0}.task .ticon{width:42px;height:42px;border-radius:16px;background:#eef4ff;display:grid;place-items:center;font-size:22px}.task small{display:block;color:var(--muted);margin-top:2px}.task.done{background:#ecfff4;border-color:#bfefd3}.check{width:31px;height:31px;border-radius:50%;border:2px solid #b8c4d7;display:grid;place-items:center;color:transparent;font-weight:1000}.task.done .check{background:var(--ok);border-color:var(--ok);color:#fff}.note{background:#eefbf8;border:1px solid #c9f1e9;border-radius:21px;padding:13px;line-height:1.45;color:#205048}.warnbox{background:#fff7df;border:1px solid #ffe1a1;border-radius:21px;padding:13px;line-height:1.45;color:#624600}.dangerbox{background:#fff0f3;border:1px solid #ffcfd9;border-radius:21px;padding:13px;line-height:1.45;color:#7e253a}.hr{height:1px;background:var(--line);margin:13px 0}.list{display:grid;gap:9px}.xp{display:inline-flex;gap:5px;align-items:center;background:#fff3d6;color:#6a4500;border:1px solid #ffdea0;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:950}.cover{position:relative;overflow:hidden;border-radius:30px;padding:18px;color:#fff;background:linear-gradient(135deg,#131f46,#5d5cff 55%,#00c2a7);box-shadow:var(--shadow)}.cover h2{font-size:30px;line-height:1;margin:0 0 7px}.cover p{margin:0;color:#eef5ff;line-height:1.45}.daily-card{background:linear-gradient(135deg,#ffffff,#eff7ff);border:1px solid #dcecff;border-radius:27px;padding:16px;box-shadow:var(--shadow)}.daily-card h3{margin:0 0 7px}.badge-shelf{display:flex;gap:8px;overflow:auto;padding:6px 0}.medal{min-width:68px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:10px;text-align:center;box-shadow:0 8px 18px rgba(16,32,51,.08)}.medal .micon{font-size:28px}.medal.lock{filter:grayscale(1);opacity:.55}.medal small{display:block;font-size:10px;color:var(--muted);font-weight:800}.world{background:linear-gradient(180deg,#122a52,#07162c);border-radius:32px;padding:16px;margin:12px 0;color:#fff;box-shadow:var(--shadow);overflow:hidden}.world-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.world h3{margin:0;font-size:23px}.map{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:15px 10px;padding:10px 0 16px}.map:before{content:"";position:absolute;left:12%;right:12%;top:38px;height:calc(100% - 70px);background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(0,194,167,.24));border-radius:999px;filter:blur(9px)}.node{position:relative;z-index:1;display:grid;justify-items:center;gap:5px;min-height:86px}.node:nth-child(8n+2),.node:nth-child(8n+6){transform:translateY(25px)}.node-btn{width:58px;height:58px;border-radius:22px;background:linear-gradient(135deg,#fff,#e4edff);border:3px solid rgba(255,255,255,.76);display:grid;place-items:center;font-weight:1000;color:#17233b;box-shadow:0 10px 25px rgba(0,0,0,.18);position:relative}.node.locked .node-btn{background:#33435d;color:#96a6bd;border-color:#53647e}.node.done .node-btn{background:linear-gradient(135deg,#35e189,#00c2a7);color:#fff}.node.current .node-btn{background:linear-gradient(135deg,#ffcb47,#ff7a45);color:#19120a;animation:pulse 1.5s infinite}.node small{font-size:10.5px;color:#d8e5ff;text-align:center;line-height:1.15;max-width:82px;height:24px;overflow:hidden}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}.legend{display:flex;gap:8px;flex-wrap:wrap}.legend span{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:6px 8px;font-size:11px;color:#dfe9ff}.lesson-modal{position:fixed;inset:0;background:rgba(5,15,33,.68);z-index:300;display:none;align-items:flex-end;justify-content:center}.lesson-modal.show{display:flex}.lesson-sheet{width:min(1100px,100%);max-height:96vh;overflow:auto;background:#f7f8fb;border-top-left-radius:30px;border-top-right-radius:30px;padding:14px 14px calc(24px + var(--safe));box-shadow:0 -20px 80px rgba(0,0,0,.28)}.lesson-hero{border-radius:27px;padding:18px;color:#fff;background:radial-gradient(circle at 85% 0,rgba(255,200,69,.55),transparent 30%),linear-gradient(135deg,#1a2454,#5d5cff 62%,#00c2a7)}.lesson-hero h2{margin:0 0 8px;font-size:28px;line-height:1.05}.lesson-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;position:sticky;top:0;background:#f7f8fb;padding:8px 0;z-index:2}.lesson-tab{background:#fff;border:1px solid var(--line);border-radius:15px;padding:9px 5px;font-size:11px;font-weight:950;color:#38465d}.lesson-tab.active{background:#07162c;color:#fff}.step{display:none}.step.active{display:block}.explain{line-height:1.58}.bilingual{display:grid;grid-template-columns:1fr 1fr;gap:10px}.langbox{background:#fff;border:1px solid var(--line);border-radius:22px;padding:13px;line-height:1.55}.examples{display:grid;gap:9px}.example{background:#fff;border-left:5px solid var(--brand);border-radius:18px;padding:12px;line-height:1.45}.reading{background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px;line-height:1.7}.word{display:inline-block;padding:1px 2px;border-radius:5px;position:relative}.word:hover,.word:active{background:#fff0ba;outline:1px solid #ffd45a}.word:hover:after{content:"+ vocab";position:absolute;left:0;bottom:100%;font-size:10px;background:#07162c;color:#fff;border-radius:999px;padding:3px 6px;white-space:nowrap}.qa{background:#fff;border:1px solid var(--line);border-radius:20px;padding:12px;margin:9px 0}.option{display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:17px;padding:12px;margin:8px 0;font-weight:750}.option.correct{background:#ecfff4;border-color:#96e7b8}.option.bad{background:#fff0f3;border-color:#ffbac8}.speak-chat{background:#fff;border:1px solid var(--line);border-radius:25px;padding:13px;display:grid;gap:10px;max-height:48vh;overflow:auto}.bubble{padding:11px 13px;border-radius:18px;line-height:1.45;max-width:88%}.bubble.ai{background:#eef4ff;justify-self:start;border-bottom-left-radius:6px}.bubble.me{background:#07162c;color:#fff;justify-self:end;border-bottom-right-radius:6px}.micbar{position:sticky;bottom:calc(78px + var(--safe));z-index:20;background:rgba(247,248,251,.92);backdrop-filter:blur(14px);padding:8px;border:1px solid var(--line);border-radius:24px;margin-top:10px}.mic-pulse{width:14px;height:14px;border-radius:50%;background:#c4ccd8;display:inline-block}.mic-pulse.on{background:#e5486d;box-shadow:0 0 0 8px rgba(229,72,109,.12);animation:pulseMic 1s infinite}@keyframes pulseMic{50%{transform:scale(1.25)}}.status{font-size:12px;color:var(--muted);font-weight:850}.toast{position:fixed;left:50%;bottom:calc(96px + var(--safe));transform:translateX(-50%);background:#07162c;color:#fff;border-radius:999px;padding:11px 14px;z-index:500;box-shadow:0 18px 40px rgba(0,0,0,.25);display:none;max-width:90%;font-weight:850}.certificate{background:linear-gradient(135deg,#fffaf0,#ffffff);border:2px solid #e5c56c;border-radius:25px;padding:20px;text-align:center}.certificate .name{font-size:28px;font-weight:1000}.certificate .level{font-size:42px;font-weight:1000;color:#7a4d00}.video-card{height:150px;border-radius:23px;background:radial-gradient(circle at 20% 20%,#fff,transparent 18%),linear-gradient(135deg,#07162c,#5d5cff 58%,#00c2a7);display:grid;place-items:center;color:white;font-weight:1000;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}.video-card .play{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:30px}.lock-overlay{opacity:.72}.placement-q{background:#fff;border:1px solid var(--line);border-radius:21px;padding:13px;margin:10px 0}.footer-space{height:20px}
@media(max-width:720px){.grid2,.grid3,.bilingual{grid-template-columns:1fr}.auth h1{font-size:36px}.hero h2,.cover h2{font-size:28px}.section-title{font-size:27px}.map{grid-template-columns:repeat(3,1fr);gap:14px 8px}.node-btn{width:54px;height:54px}.lesson-nav{grid-template-columns:repeat(4,1fr);overflow:auto}.lesson-tab{font-size:10px}.topbar{padding:10px}.brand p{max-width:170px}.card{border-radius:24px;padding:14px}.lesson-sheet{border-top-left-radius:26px;border-top-right-radius:26px}.bubble{max-width:94%}}

.coach-panel{background:linear-gradient(135deg,#ffffff,#f1f5ff);border:1px solid #dce5ff}.interim-box{min-height:24px;background:#f7f9fe;border:1px dashed #c9d5ea;border-radius:15px;padding:8px;margin-top:8px}.bubble b{font-size:12px;opacity:.72;margin-right:4px}.speak-chat{scroll-behavior:smooth}.micbar{box-shadow:0 10px 35px rgba(16,32,51,.12)}
</style>
</head>
<body>
<div id="auth" class="auth"><div class="auth-wrap"><div class="auth-logo">F</div><h1>Fluentia IA</h1><p>Aprende inglés con una ruta gamificada, práctica diaria, speaking conversacional, listening, vocabulario y certificados internos por nivel.</p><div class="card"><h3>Crear estudiante</h3><input id="newName" class="field" placeholder="Nombre del estudiante"><div class="grid2" style="margin-top:10px"><select id="newLevel" class="field"><option value="Placement">Hacer test de ubicación</option><option>A1</option><option>A2</option><option>B1</option><option selected>B2</option><option>C1</option><option>C2</option></select><select id="newGoal" class="field"><option>Ser bilingüe funcional rápido</option><option>Mejorar speaking</option><option>Preparar TOEFL</option><option>Business English</option></select></div><button class="btn full" style="margin-top:10px" onclick="createProfile()">Entrar</button></div><div class="card"><h3>Usuarios guardados</h3><div id="profiles"></div></div></div></div>
<div id="app" class="app hidden"><div class="topbar"><div class="brand"><div class="logo">F</div><div><h1>Fluentia IA</h1><p id="topSub">Tu coach bilingüe diario</p></div></div><div class="row"><span class="pill dark" id="xpPill">0 XP</span><button class="btn secondary small" onclick="logout()">👤</button></div></div>
<section id="home" class="screen active"></section><section id="modules" class="screen"></section><section id="speaking" class="screen"></section><section id="practice" class="screen"></section><section id="progress" class="screen"></section>
<nav class="nav"><button class="active" data-nav="home"><span class="ico">🏠</span>Inicio</button><button data-nav="modules"><span class="ico">🗺️</span>Ruta</button><button data-nav="speaking"><span class="ico">🎙️</span>Speaking</button><button data-nav="practice"><span class="ico">🎧</span>Práctica</button><button data-nav="progress"><span class="ico">🏆</span>Progreso</button></nav></div>
<div id="lessonModal" class="lesson-modal"></div><div id="toast" class="toast"></div>
<script defer src="app.js?v=12"></script>
</body>
